{% extends "base.html" %}

{% block title %}Upload Image - Crop Disease Detection{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8 col-xl-6">
        <div class="card shadow-lg border-0">
            <div class="card-header bg-success text-white text-center py-4">
                <h2 class="mb-0"><i class="fas fa-upload me-3"></i>Upload Leaf Image</h2>
                <p class="mb-0 opacity-75">Supported formats: JPG, PNG, JPEG (Max 16MB)</p>
            </div>
            <div class="card-body p-5">
                <form method="post" enctype="multipart/form-data" id="uploadForm">
                    <div class="mb-4">
                        <label for="file" class="form-label fw-bold">Select Image</label>
                        <div class="file-upload-wrapper">
                            <input type="file" class="form-control form-control-lg" id="file" name="file" 
                                   accept="image/*" required>
                            <div class="file-info mt-2">
                                <small class="text-muted">No file selected</small>
                            </div>
                        </div>
                    </div>
                    
                    <div id="imagePreview" class="text-center mb-4" style="display: none;">
                        <img id="previewImg" class="img-fluid rounded shadow" style="max-height: 300px;">
                    </div>
                    
                    <div class="d-grid">
                        <button type="submit" class="btn btn-success btn-lg py-3 fw-bold" id="submitBtn">
                            <span class="spinner-border spinner-border-sm me-2 d-none" id="loadingSpinner"></span>
                            <i class="fas fa-search me-2"></i>Analyze Image
                        </button>
                    </div>
                </form>
                
                <div class="text-center mt-4">
                    <div class="row g-3">
                        <div class="col-6">
                            <div class="card h-100 border-success">
                                <div class="card-body text-center p-3">
                                    <i class="fas fa-check-circle text-success fa-2x mb-2"></i>
                                    <div>95%+ Accuracy</div>
                                </div>
                            </div>
                        </div>
                        <div class="col-6">
                            <div class="card h-100 border-primary">
                                <div class="card-body text-center p-3">
                                    <i class="fas fa-clock text-primary fa-2x mb-2"></i>
                                    <div>Instant Results</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="text-center mt-4">
            <a href="{{ url_for('home') }}" class="btn btn-outline-secondary">
                <i class="fas fa-arrow-left me-2"></i>Back to Home
            </a>
        </div>
    </div>
</div>
{% endblock %}
